[env]
TERM                   = "xterm-256color"
WINIT_X11_SCALE_FACTOR = "1"

[window]
dynamic_padding       = true
decorations           = "full"
title                 = "Alacritty@CachyOS"
opacity               = 1.0
decorations_theme_variant = "Dark"

[window.dimensions]
columns               = 100
lines                 = 30

[window.class]
instance              = "Alacritty"
general               = "Alacritty"

[scrolling]
history               = 10000
multiplier            = 3

# -----------------------------------------------------------------------------
# Everforest Alacritty Colors
# Theme: Everforest Dark Medium
# Upstream: https://github.com/sainnhe/everforest
# -----------------------------------------------------------------------------
[colors]
draw_bold_text_with_bright_colors = false

[colors.primary]
background            = "#2d353b"
foreground            = "#d3c6aa"

[colors.cursor]
text                  = "#2d353b"
cursor                = "#d3c6aa"

[colors.normal]
black                 = "#7a8478"
red                   = "#e67e80"
green                 = "#a7c080"
yellow                = "#dbbc7f"
blue                  = "#7fbbb3"
magenta               = "#d699b6"
cyan                  = "#83c092"
white                 = "#d3c6aa"

[colors.bright]
black                 = "#9da9a0"
red                   = "#eb9b9d"
green                 = "#c1d6a0"
yellow                = "#e5d3a4"
blue                  = "#a6d2cd"
magenta               = "#e3b4c6"
cyan                  = "#a8d5ad"
white                 = "#e8e2cf"

[colors.selection]
text                  = "#2d353b"
background            = "#d3c6aa"

[font]
size                  = 16

[font.normal]
family                = "Maple Mono NL NF CN"
style                 = "Regular"

[font.bold]
family                = "Maple Mono NL NF CN"
style                 = "Bold"

[font.italic]
family                = "Maple Mono NL NF CN"
style                 = "Italic"

[font.bold_italic]
family                = "Maple Mono NL NF CN"
style                 = "Bold Italic"

[selection]
semantic_escape_chars = ",│`|:\"' ()[]{}<>\t"
save_to_clipboard     = true

[cursor]
style                 = "Underline"
vi_mode_style         = "Block"
unfocused_hollow      = true
thickness             = 0.15



[mouse]
hide_when_typing       = true

[[mouse.bindings]]
mouse                  = "Middle"
action                 = "PasteSelection"
